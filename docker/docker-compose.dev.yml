services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${CADDY_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend
    networks:
      - blog-net

  backend:
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      - NUXT_THEME=${NUXT_THEME:-tech-dark}
      - NUXT_PUBLIC_BACKEND_URL=http://localhost:8000
    entrypoint: ["/app/docker-entrypoint.dev.sh"]
    command: npx nuxt dev --host 0.0.0.0

  redis:
    command: redis-server --save "" --appendonly no

networks:
  blog-net:
    driver: bridge
