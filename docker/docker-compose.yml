services:
  backend:
    image: ghcr.io/giacomomicoli/tech-blog/backend:${IMAGE_TAG:-latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    networks:
      - blog-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/giacomomicoli/tech-blog/frontend:${IMAGE_TAG:-latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NUXT_THEME=${NUXT_THEME:-tech-dark}
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - blog-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    networks:
      - blog-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  blog-net:
    driver: overlay
    attachable: true
